  <rect width="900" height="420" rx="28" fill="url(#bg)" stroke="#38bdf8" stroke-opacity="0.22"/>
  <rect x="28" y="28" width="844" height="364" rx="22" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-dasharray="12 10"/>
