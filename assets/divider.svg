  </defs>
  <rect width="1600" height="60" fill="none"/>
  <line x1="120" y1="30" x2="1480" y2="30" stroke="url(#line)" stroke-width="2.5"/>
  <circle cx="800" cy="30" r="6" fill="#0ea5e9"/>
  <circle cx="800" cy="30" r="16" fill="#0ea5e9" opacity="0.12"/>
  <circle cx="800" cy="30" r="28" fill="#0ea5e9" opacity="0.05"/>
