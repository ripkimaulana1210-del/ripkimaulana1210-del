<svg width="1600" height="60" viewBox="0 0 1600 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Divider</title>
  <desc id="desc">Minimal neon divider for GitHub profile sections.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
