<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ripki Maulana Banner</title>
  <desc id="desc">Premium futuristic GitHub profile banner with neon blue accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>
  <rect width="1600" height="420" rx="36" fill="url(#bg)"/>
  <circle cx="1280" cy="85" r="180" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="250" cy="320" r="160" fill="#22d3ee" opacity="0.08" filter="url(#blur)"/>
  <g opacity="0.22">
    <path d="M90 290H1510" stroke="#7dd3fc" stroke-width="1"/>
    <path d="M110 330H1490" stroke="#7dd3fc" stroke-width="1"/>
    <path d="M140 370H1460" stroke="#7dd3fc" stroke-width="1"/>
  </g>
  <g opacity="0.18">
    <circle cx="1120" cy="170" r="3" fill="#e0f2fe"/>
    <circle cx="1180" cy="120" r="2.5" fill="#e0f2fe"/>
    <circle cx="1260" cy="155" r="2.5" fill="#e0f2fe"/>
    <circle cx="1330" cy="110" r="2" fill="#e0f2fe"/>
    <circle cx="1410" cy="165" r="2.5" fill="#e0f2fe"/>
  </g>
  <g filter="url(#shadow)">
    <text x="90" y="175" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="1">RIPKI MAULANA</text>
    <text x="92" y="228" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">AI • Machine Learning • Software Development • Data Analysis</text>
    <text x="92" y="280" fill="#93c5fd" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="500">Building useful systems with a clean product mindset</text>
  </g>
  <g transform="translate(1145,95)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="230" rx="28" fill="#0b1220" stroke="#38bdf8" stroke-opacity="0.35"/>
    <rect x="18" y="18" width="294" height="194" rx="20" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-dasharray="10 8"/>
    <circle cx="58" cy="58" r="8" fill="#22c55e"/>
    <circle cx="86" cy="58" r="8" fill="#eab308"/>
    <circle cx="114" cy="58" r="8" fill="#ef4444"/>
    <text x="26" y="110" fill="#7dd3fc" font-family="JetBrains Mono, Consolas, monospace" font-size="19">UI / UX</text>
    <text x="26" y="145" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Premium Profile</text>
    <text x="26" y="180" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Clean. Futuristic. Focused.</text>
  </g>
</svg>
