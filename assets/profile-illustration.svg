    <path d="M120 610H1080" stroke="#7dd3fc" stroke-width="1"/>
    <path d="M150 100V620" stroke="#7dd3fc" stroke-width="1"/>
    <path d="M1050 100V620" stroke="#7dd3fc" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="100" y="90" width="1000" height="520" rx="30" fill="#0b1220" stroke="#38bdf8" stroke-opacity="0.24"/>
    <rect x="140" y="130" width="920" height="440" rx="24" fill="none" stroke="#38bdf8" stroke-opacity="0.16" stroke-dasharray="12 10"/>
    <circle cx="200" cy="190" r="11" fill="#22c55e"/>
    <circle cx="236" cy="190" r="11" fill="#f59e0b"/>
    <circle cx="272" cy="190" r="11" fill="#ef4444"/>
    <g transform="translate(250,190)">
      <circle cx="260" cy="120" r="92" fill="#0ea5e9" opacity="0.12"/>
      <circle cx="260" cy="120" r="72" fill="#38bdf8" opacity="0.18"/>
      <circle cx="260" cy="120" r="52" fill="url(#neon)" opacity="0.35"/>
      <path d="M200 258c16-42 45-64 60-64s44 22 60 64" fill="none" stroke="#93c5fd" stroke-width="6" stroke-linecap="round"/>
      <circle cx="260" cy="116" r="28" fill="#e0f2fe"/>
      <path d="M224 156c11 16 25 24 36 24s25-8 36-24" fill="none" stroke="#e0f2fe" stroke-width="5" stroke-linecap="round"/>
      <path d="M196 98c20-28 43-42 64-42s44 14 64 42" fill="none" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
      <rect x="392" y="62" width="330" height="38" rx="19" fill="#11243a"/>
      <rect x="392" y="120" width="420" height="18" rx="9" fill="#1d4ed8" opacity="0.7"/>
      <rect x="392" y="154" width="360" height="18" rx="9" fill="#1d4ed8" opacity="0.5"/>
